name: RELPER Webflow Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore geocode cache
        uses: actions/cache@v4
        with:
          path: geocode-cache.json
          key: geocode-cache-${{ hashFiles('src/geocoder.js') }}
          restore-keys: |
            geocode-cache-

      - name: Restore translate cache
        uses: actions/cache@v4
        with:
          path: translate-cache.json
          key: translate-cache-${{ hashFiles('src/translator.js') }}
          restore-keys: |
            translate-cache-

      - name: Run sync
        run: node index.js
        env:
          RELPER_FEED_URL: ${{ secrets.RELPER_FEED_URL }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
          TRANSLATE_ENABLED: ${{ secrets.TRANSLATE_ENABLED }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          WEBFLOW_CMS_LOCALE_SR: ${{ secrets.WEBFLOW_CMS_LOCALE_SR }}
          WEBFLOW_CMS_LOCALE_EN: ${{ secrets.WEBFLOW_CMS_LOCALE_EN }}
          WEBFLOW_CMS_LOCALE_RU: ${{ secrets.WEBFLOW_CMS_LOCALE_RU }}
